name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS signed + notarized installers
        if: matrix.os == 'macos-latest'
        env:
          VITE_CONVEX_URL: https://uncommon-dodo-93.convex.cloud
          VITE_CONVEX_SITE_URL: https://uncommon-dodo-93.convex.site
          VITE_ENABLE_GOOGLE_AUTH: "true"
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          printf '%s' "$CSC_LINK_BASE64" | base64 -D > "$CERT_PATH"
          export CSC_LINK="$CERT_PATH"
          npx vue-tsc
          npx vite build
          npx electron-builder --mac dmg zip --universal --publish never
          npx electron-builder --mac dmg zip --x64 --publish never

      - name: Build Windows installers
        if: matrix.os == 'windows-latest'
        env:
          VITE_CONVEX_URL: https://uncommon-dodo-93.convex.cloud
          VITE_CONVEX_SITE_URL: https://uncommon-dodo-93.convex.site
          VITE_ENABLE_GOOGLE_AUTH: "true"
        run: |
          npx vue-tsc
          npx vite build
          npx electron-builder --win nsis --x64 --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: release/
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release with auto notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.zip
            release-artifacts/**/*.exe
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.yml
            release-artifacts/**/*.yaml
            release-artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
