name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers (manual/non-tag)
        if: startsWith(github.ref, 'refs/tags/') == false
        env:
          VITE_CONVEX_URL: https://uncommon-dodo-93.convex.cloud
          VITE_CONVEX_SITE_URL: https://uncommon-dodo-93.convex.site
          VITE_ENABLE_GOOGLE_AUTH: "true"
        run: npm run build

      - name: Publish installers to GitHub Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_CONVEX_URL: https://uncommon-dodo-93.convex.cloud
          VITE_CONVEX_SITE_URL: https://uncommon-dodo-93.convex.site
          VITE_ENABLE_GOOGLE_AUTH: "true"
        run: npm run publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: release/
          if-no-files-found: warn
