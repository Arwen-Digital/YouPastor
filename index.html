<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body, #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .boot-loader {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #ffffff;
      }

      .boot-loader__logo {
        width: 46px;
        height: 46px;
        border-radius: 10px;
      }

      .boot-loader__spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(0, 0, 0, 0.15);
        border-top-color: rgba(0, 0, 0, 0.7);
        border-radius: 9999px;
        animation: boot-spin 0.85s linear infinite;
      }

      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <title>YouPastor</title>
  </head>
  <body>
    <div id="app">
      <div class="boot-loader" aria-label="Loading app" role="status">
        <img src="/icon.png" alt="" class="boot-loader__logo" />
        <div class="boot-loader__spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
