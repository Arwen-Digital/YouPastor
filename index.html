<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body, #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      .boot-loader {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #ffffff;
      }

      .boot-loader__logo {
        width: 46px;
        height: 46px;
        border-radius: 10px;
      }

      .boot-loader__dots {
        display: flex;
        gap: 6px;
      }

      .boot-loader__dot {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        background: rgba(0, 0, 0, 0.7);
        animation: boot-dot 1s ease-in-out infinite;
      }

      .boot-loader__dot:nth-child(2) { animation-delay: 0.15s; }
      .boot-loader__dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes boot-dot {
        0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
    <title>YouPastor</title>
  </head>
  <body>
    <div id="app">
      <div class="boot-loader" aria-label="Loading app" role="status">
        <img src="/icon.png" alt="" class="boot-loader__logo" />
        <div class="boot-loader__dots" aria-hidden="true">
          <span class="boot-loader__dot"></span>
          <span class="boot-loader__dot"></span>
          <span class="boot-loader__dot"></span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
